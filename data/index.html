<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
        rel="stylesheet">
    <title>ESP32 WebServer</title>
</head>

<body>
    <header>
        <div class="headerDiv">
            <h2>ESP32 Async WebServer</h2>
        </div>
        <div style="width: 100%; height: 2px; background-color: grey;"> </div>
    </header>
    <div style="display: grid; grid-template-rows: 30% 30% 40%; height: 100%; width: 100%; padding: 5% 0;">
        <div class="tasksSensores">
            <div class="taskSensor">
                <img src="snowflake-svgrepo-com.svg" alt="Snowflake"
                    style="max-width: 100%; max-height: 100%; width: 85%; padding: 10% 0">
                <div class="subtasksensor">
                    <p style="font-size: 2fr; margin-bottom: 0;">Temp/Humid</p>
                    <p style="font-size: 2rem; margin-top: 10%">5C 55</p>
                </div>
            </div>
            <div class="taskSensor">
                <img src="gas-mask-svgrepo-com.svg" alt="Gas Mask"
                    style="max-width: 100%; max-height: 100%; width: 85%; padding: 15% 0">
                <div class="subtasksensor">
                    <p style="font-size: 2fr; margin-bottom: 0;">CO1 levels</p>
                    <p style="font-size: 2rem; margin-top: 10%">55</p>
                </div>
            </div>
            <div class="taskSensor">
                <img src="mountain-svgrepo-com.svg" alt="Mountain"
                    style="max-width: 100%; max-height: 100%;  padding: 25% 0;">
                <div class="subtasksensor">
                    <p style="font-size: 2fr; margin-bottom: 0;">Alt press</p>
                    <p style="font-size: 2rem; margin-top: 10%">55 11</p>
                </div>
            </div>
        </div>
    </div>
    <footer>
        <div style="height: 2vh;" class="headerDiv">
            <h3>Feito por Nícolas da Costa Ferreira, PUCRS, 2026</h2>
        </div>
    </footer>
</body>

</html>
